---
- name: Check if Oh My Zsh is already installed
  ansible.builtin.stat:
    path: "{{ omz_install_dir }}"
  register: omz_installed

- name: Download Oh My Zsh installer
  ansible.builtin.get_url:
    url: https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh
    dest: /tmp/install_omz.sh
    mode: "0755"
  when: not omz_installed.stat.exists

- name: Install Oh My Zsh
  ansible.builtin.command:
    cmd: /tmp/install_omz.sh --unattended
  become: true
  become_user: "{{ shell_user }}"
  environment:
    HOME: "{{ shell_user_home }}"
    ZSH: "{{ omz_install_dir }}"
  when: not omz_installed.stat.exists

- name: Install zsh-autosuggestions plugin
  ansible.builtin.git:
    repo: https://github.com/zsh-users/zsh-autosuggestions
    dest: "{{ omz_install_dir }}/custom/plugins/zsh-autosuggestions"
    depth: 1
  become: true
  become_user: "{{ shell_user }}"

- name: Install zsh-syntax-highlighting plugin
  ansible.builtin.git:
    repo: https://github.com/zsh-users/zsh-syntax-highlighting
    dest: "{{ omz_install_dir }}/custom/plugins/zsh-syntax-highlighting"
    depth: 1
  become: true
  become_user: "{{ shell_user }}"

- name: Install zsh-completions plugin
  ansible.builtin.git:
    repo: https://github.com/zsh-users/zsh-completions
    dest: "{{ omz_install_dir }}/custom/plugins/zsh-completions"
    depth: 1
  become: true
  become_user: "{{ shell_user }}"
