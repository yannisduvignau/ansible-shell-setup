---
# Installe atuin en téléchargeant directement le binaire depuis GitHub
# (bypass du script setup.atuin.sh qui requiert /dev/tty pour ses prompts interactifs)

- name: Check if atuin is already installed
  ansible.builtin.stat:
    path: "{{ shell_user_home }}/.atuin/bin/atuin"
  register: atuin_bin

- name: Get latest atuin release info from GitHub API
  ansible.builtin.uri:
    url: https://api.github.com/repos/atuinsh/atuin/releases/latest
    return_content: true
    headers:
      Accept: application/vnd.github.v3+json
  register: atuin_release
  when: not atuin_bin.stat.exists

- name: Set atuin version and download URL
  ansible.builtin.set_fact:
    atuin_version: "{{ atuin_release.json.tag_name | regex_replace('^v', '') }}"
    atuin_archive: "atuin-{{ atuin_release.json.tag_name | regex_replace('^v', '') }}-x86_64-unknown-linux-musl.tar.gz"
  when: not atuin_bin.stat.exists

- name: "Download atuin {{ atuin_version }} binary archive"
  ansible.builtin.get_url:
    url: "https://github.com/atuinsh/atuin/releases/download/v{{ atuin_version }}/{{ atuin_archive }}"
    dest: "/tmp/{{ atuin_archive }}"
    mode: "0644"
  when: not atuin_bin.stat.exists

- name: Ensure atuin bin directory exists
  ansible.builtin.file:
    path: "{{ shell_user_home }}/.atuin/bin"
    state: directory
    owner: "{{ shell_user }}"
    group: "{{ shell_user }}"
    mode: "0755"
  when: not atuin_bin.stat.exists

- name: Extract atuin binary
  ansible.builtin.unarchive:
    src: "/tmp/{{ atuin_archive }}"
    dest: "/tmp"
    remote_src: true
    extra_opts: ["--wildcards", "*/atuin"]
  when: not atuin_bin.stat.exists

- name: Install atuin binary to ~/.atuin/bin/
  ansible.builtin.copy:
    src: "/tmp/atuin-{{ atuin_version }}-x86_64-unknown-linux-musl/atuin"
    dest: "{{ shell_user_home }}/.atuin/bin/atuin"
    owner: "{{ shell_user }}"
    group: "{{ shell_user }}"
    mode: "0755"
    remote_src: true
  when: not atuin_bin.stat.exists

- name: Symlink atuin to /usr/local/bin for system-wide access
  ansible.builtin.file:
    src: "{{ shell_user_home }}/.atuin/bin/atuin"
    dest: /usr/local/bin/atuin
    state: link
    force: true

- name: Clean up temporary archive
  ansible.builtin.file:
    path: "/tmp/{{ atuin_archive }}"
    state: absent
  when: not atuin_bin.stat.exists

- name: Ensure atuin config directory exists
  ansible.builtin.file:
    path: "{{ shell_user_home }}/.config/atuin"
    state: directory
    owner: "{{ shell_user }}"
    group: "{{ shell_user }}"
    mode: "0755"

- name: Deploy atuin config
  ansible.builtin.template:
    src: config.toml.j2
    dest: "{{ shell_user_home }}/.config/atuin/config.toml"
    owner: "{{ shell_user }}"
    group: "{{ shell_user }}"
    mode: "0644"